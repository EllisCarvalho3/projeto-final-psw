{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="spad" style="background: #190033; padding-top: 60px; padding-bottom: 60px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div style="background: #0a0014; border-radius: 10px; border-top: 4px solid #5c00ce; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div class="mb-4">
                        <h3 class="text-white font-weight-bold mb-1">Preencha os dados</h3>
                        <p class="text-muted" style="font-size: 14px;">Mantenha as informações atualizadas para evitar inconsistências cadastrais.</p>
                    </div>

                    <form method="post" class="text-white">
                        {% csrf_token %}
                        
                        <div class="django-form-wrapper">
                            {{ form.as_p }}
                        </div>

                        <div class="mt-4 pt-3 border-top" style="border-color: rgba(255,255,255,0.05) !important;">
                            <button type="submit" class="primary-btn" style="border: none; padding: 12px 30px;">Salvar registro</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

<style>
    .django-form-wrapper p {
        margin-bottom: 20px;
    }
    .django-form-wrapper label {
        display: block;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #a5a5a5;
        margin-bottom: 6px;
    }
    .django-form-wrapper input, 
    .django-form-wrapper select, 
    .django-form-wrapper textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 4px;
        padding: 10px 15px;
        color: #ffffff !important;
        font-size: 15px;
        transition: all 0.3s;
    }
    .django-form-wrapper input:focus, 
    .django-form-wrapper select:focus, 
    .django-form-wrapper textarea:focus {
        background: rgba(255, 255, 255, 0.07) !important;
        border-color: #5c00ce !important;
        outline: none;
        box-shadow: 0 0 10px rgba(92, 0, 206, 0.3);
    }
</style>
{% endblock %}
