{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="spad" style="background: #190033; padding-top: 60px; padding-bottom: 60px;">
    <div class="container">
        
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2 class="text-white font-weight-bold mb-1" style="letter-spacing: 1px;">Matrículas</h2>
                <p class="text-muted mb-0" style="font-size: 14px;">Vínculos ativos entre alunos e turmas</p>
            </div>
            <div class="col-md-6 text-md-right mt-3 mt-md-0">
                <a href="/matricula/criar/" class="primary-btn" style="padding: 10px 22px; font-size: 14px; text-transform: uppercase;">+ Nova Matrícula</a>
            </div>
        </div>

        <div class="table-responsive" style="background: rgba(10, 0, 20, 0.7); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); padding: 20px;">
            <table class="table text-white mb-0" style="border-collapse: separate; border-spacing: 0 8px;">
                <thead>
                    <tr style="border-bottom: 2px solid #5c00ce; font-family: 'Rajdhani', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;">
                        <th style="border: none; color: #5c00ce; padding-bottom: 15px;">Aluno</th>
                        <th style="border: none; color: #5c00ce; padding-bottom: 15px;">Turma</th>
                        <th style="border: none; color: #5c00ce; padding-bottom: 15px; text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for matricula in matriculas %}
                    <tr style="background: rgba(255,255,255,0.02); border-radius: 4px; transition: all 0.3s;">
                        <td style="border: none; vertical-align: middle; padding: 15px; font-weight: 500;"><i class="fa fa-user-circle-o text-muted mr-2"></i>{{ matricula.aluno }}</td>
                        <td style="border: none; vertical-align: middle; padding: 15px;" class="text-muted">{{ matricula.turma }}</td>
                        <td style="border: none; vertical-align: middle; padding: 15px; text-align: right;">
                            
                            <a href="{% url 'detail_matricula' matricula.id %}" class="btn btn-sm btn-outline-info mr-1" title="Detalhes" style="border-color: rgba(23, 162, 184, 0.3); color: #17a2b8; background: transparent;">
                            <i class="fa fa-eye"></i>
                            </a>
                            <a href="{% url 'update_matricula' matricula.id %}" class="btn btn-sm btn-outline-light mr-1" title="Editar" style="border-color: rgba(255,255,255,0.15); background: transparent;">
                                <i class="fa fa-edit"></i>
                            </a>
                            <a href="{% url 'delete_matricula' matricula.id %}" class="btn btn-sm btn-danger" title="Excluir" style="background: #a10036; border: none;">
                                <i class="fa fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted pt-4">Nenhuma matrícula registrada.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</section>
{% endblock %}
