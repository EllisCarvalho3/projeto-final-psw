{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="card p-4 text-white" style="border-radius: 10px; background-color: rgba(76, 20, 131, 0.43);">
        <h2 class="mb-4">Comprovante de Matrícula</h2>
        <hr style="border-color: rgb(104, 37, 163);">
        
        <div class="mb-3">
            <p class="mb-1 text-muted">Estudante</p>
            <h4>{{ matricula.aluno.nome }}</h4>
        </div>
        <div class="mb-3">
            <p class="mb-1 text-muted">Turma Vinculada</p>
            <h4>{{ matricula.turma.nome }} — Horário: {{ matricula.turma.horario }}</h4>
        </div>
        <div class="mb-4">
            <p class="mb-1 text-muted">Data da Matrícula</p>
            <h4>{{ matricula.data_matricula|date:"d/m/Y" }}</h4>
        </div>

        <div class="mt-3">
            <a class="btn btn-outline-light" href="/matricula/">Voltar para listagem</a>
        </div>
    </div>
</div>
{% endblock %}
